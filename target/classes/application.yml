server:

  port: ${PORT:8080}



spring:

  application:

    name: paradis-saveurs-api

  datasource:

    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/paradis_saveurs}

    username: ${DATABASE_USERNAME:postgres}

    password: ${DATABASE_PASSWORD:passer}

    driver-class-name: org.postgresql.Driver

  jpa:

    hibernate:

      ddl-auto: update

    show-sql: false

    properties:

      hibernate:

        dialect: org.hibernate.dialect.PostgreSQLDialect

        format_sql: true

  servlet:

    multipart:

      max-file-size: 5MB

      max-request-size: 5MB



app:

  jwt:

    secret: ${JWT_SECRET:ParadisDesSaveursSecretKey2024ChangeMeInProductionMin32Chars!!}

    expiration-ms: 28800000

    cleanup-interval-ms: 3600000

  cors:

    allowed-origins: http://localhost:5173,http://127.0.0.1:5173,https://paradissaveur.vercel.app

  upload-dir: uploads

  notifications:

    twilio:

      account-sid: ${TWILIO_ACCOUNT_SID:}

      auth-token: ${TWILIO_AUTH_TOKEN:}

      whatsapp-from: ${TWILIO_WHATSAPP_FROM:}

      sms-from: ${TWILIO_SMS_FROM:}

    firebase:

      credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

